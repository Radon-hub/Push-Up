services:
  app:
    build: .
    container_name: push-up-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - internal
      - shared
  postgres:
    image: postgres:17
    container_name: push-up-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: pushup-db
    volumes:
      - pushup-pq-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    container_name: pushup-minio
    ports:
      - 9005:9000
      - 9006:9001
    environment:
      MINIO_ROOT_USER: pushup
      MINIO_ROOT_PASSWORD: pushup123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - shared
      - internal
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: pushup-redis
    ports:
      - 6379:6379
    volumes:
      - pushup-redis-data:/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse:latest
    container_name: pushup-clickhouse
    ports:
      - 8123:8123
      - 9000:9000
    networks:
      - shared
      - internal
    volumes:
      - ./s3.xml:/etc/clickhouse-server/config.d/s3.xml
      - ./users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      -  pushup-clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8123/ping" ]
      interval: 15s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pushup-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - shared
      - internal

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pushup-kafka
    depends_on:
      - zookeeper
    ports:
      - "9097:9092"
    environment:
      KAFKA_BROKER_ID: 1

      # INTERNAL listener for communication *inside Docker* between services
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      #      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9097
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Zookeeper connection
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_MS: 260000000

    networks:
      - shared
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"
        ]
      interval: 20s
      timeout: 10s
      retries: 10

volumes:
  minio_data:
  pushup-redis-data:
  pushup-clickhouse-data:
  pushup-pq-data:

networks:
  internal:
    driver: bridge

  shared:
    external: true
    name: pushup-shared-net
